# Air - Live Reloading for Go Applications
# Docs: https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  # Build command
  cmd = "go build -o ./tmp/main.exe ./cmd/server"
  # Binary output
  bin = "tmp/main.exe"
  # Watch these file extensions
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  # Exclude directories from watching
  exclude_dir = ["assets", "tmp", "vendor", "node_modules", "logs"]
  # Exclude files
  exclude_file = []
  # Exclude regex patterns
  exclude_regex = ["_test\\.go"]
  # Exclude unchanged files
  exclude_unchanged = true
  # Follow symlinks
  follow_symlink = false
  # Delay before rebuilding after a change (ms)
  delay = 500
  # Stop running old binary before building new one
  stop_on_error = true
  # Send interrupt signal before killing process
  send_interrupt = true
  # Delay after sending interrupt signal (ms)
  kill_delay = 500

[log]
  # Show log time
  time = true
  # Only show main log (silences watcher/build logs)
  main_only = false

[color]
  # Customize colors for different log types
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # Delete tmp directory on exit
  clean_on_exit = true
